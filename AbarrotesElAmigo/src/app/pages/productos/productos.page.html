<ion-header>
  <ion-toolbar style="--background: #1a5c2a; --color: white;">
    <ion-title style="color: white;">Productos</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content>

  <!-- Barra de búsqueda -->
  <ion-searchbar
    placeholder="Buscar producto..."
    [(ngModel)]="textoBusqueda"
    (ionInput)="buscar()"
    style="--background: #ffffff; --color: #222; --placeholder-color: #999;">
  </ion-searchbar>

  <!-- Lista de productos -->
  <ion-list style="margin: 0 12px; border-radius: 10px; overflow: hidden;">

    <ion-item *ngFor="let producto of productosFiltrados">
      <ion-label>
        <h2 style="color: #222; font-weight: 500;">{{ producto.nombre }}</h2>
        <p style="color: #666;">{{ producto.categoria }}</p>
        <p style="color: #666;">₡{{ producto.precio }} — Stock: {{ producto.cantidad }}</p>
      </ion-label>

      <!-- Botón editar -->
      <ion-button slot="end" fill="clear" (click)="editarProducto(producto)">
        <ion-icon name="create-outline" style="color: #1a5c2a;"></ion-icon>
      </ion-button>

      <!-- Botón eliminar -->
      <ion-button slot="end" fill="clear" (click)="eliminarProducto(producto)">
        <ion-icon name="trash-outline" style="color: #e53935;"></ion-icon>
      </ion-button>

    </ion-item>

    <!-- Mensaje cuando no hay productos -->
    <ion-item *ngIf="productosFiltrados.length === 0">
      <ion-label style="text-align: center; color: #aaa;">
        Sin productos registrados
      </ion-label>
    </ion-item>

  </ion-list>

  <!-- Botón flotante para agregar producto -->
  <ion-fab vertical="bottom" horizontal="end" slot="fixed">
    <ion-fab-button style="--background: #1a5c2a;" (click)="abrirFormulario()">
      <ion-icon name="add"></ion-icon>
    </ion-fab-button>
  </ion-fab>

</ion-content>
